name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check required files
      run: |
        test -f sap_quantum_led.py   || { echo "MISSING sap_quantum_led.py"; exit 1; }
        test -f rqb-demo.json        || { echo "MISSING rqb-demo.json"; exit 1; }
        test -f LICENSE              || { echo "MISSING LICENSE"; exit 1; }
        test -f README.md            || { echo "MISSING README.md"; exit 1; }
        test -f desktop/icons/sap-logo.png || { echo "MISSING desktop/icons/sap-logo.png"; exit 1; }

    - name: Python syntax check
      run: python -m py_compile sap_quantum_led.py

    - name: Validate rqb-demo.json
      run: python -c "import json,sys; json.load(open('rqb-demo.json'))" && echo "rqb-demo.json is valid JSON"

    - name: Check rq_led_utils usage
      run: |
        grep -q "from rq_led_utils import" sap_quantum_led.py  || { echo "MISSING rq_led_utils import"; exit 1; }
        grep -q "chunked_show"             sap_quantum_led.py  || { echo "MISSING chunked_show"; exit 1; }
        grep -q "get_led_config"           sap_quantum_led.py  || { echo "MISSING get_led_config"; exit 1; }
        grep -q "map_xy_to_pixel"          sap_quantum_led.py  || { echo "MISSING map_xy_to_pixel"; exit 1; }
        ! grep -q "pixels\.show()"         sap_quantum_led.py  || { echo "FORBIDDEN bare pixels.show()"; exit 1; }

    - name: Check quantum circuit
      run: |
        grep -q "AerSimulator"   sap_quantum_led.py || { echo "MISSING AerSimulator"; exit 1; }
        grep -q "measure_all"    sap_quantum_led.py || { echo "MISSING measure_all"; exit 1; }
        grep -q "shots="         sap_quantum_led.py || { echo "MISSING shots= parameter"; exit 1; }

    - name: Check no hardcoded layout
      run: |
        ! grep -qE "\b(22|24)x8\b|range\(8\)|range\(22\)|7 *- *y|y_flip" sap_quantum_led.py \
          || { echo "FORBIDDEN hardcoded layout or y-flip"; exit 1; }
