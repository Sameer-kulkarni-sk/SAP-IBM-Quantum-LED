name: Validate Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    name: Validate Repository Structure
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check required files exist
      run: |
        echo "Checking required files..."
        
        # Core files
        test -f README.md || { echo "❌ README.md missing"; exit 1; }
        test -f LICENSE || { echo "❌ LICENSE missing"; exit 1; }
        test -f CONTRIBUTING.md || { echo "❌ CONTRIBUTING.md missing"; exit 1; }
        test -f .gitignore || { echo "❌ .gitignore missing"; exit 1; }
        
        # Source files
        test -f src/sap_led_demo.py || { echo "❌ src/sap_led_demo.py missing"; exit 1; }
        test -f src/sap_quantum_led_demo.py || { echo "❌ src/sap_quantum_led_demo.py missing"; exit 1; }
        test -f src/neopixel_spi_SAPtestFunc.py || { echo "❌ src/neopixel_spi_SAPtestFunc.py missing"; exit 1; }
        
        # Scripts
        test -f scripts/rq_led_sap_demo.sh || { echo "❌ scripts/rq_led_sap_demo.sh missing"; exit 1; }
        
        # Patches
        test -f patches/patch_virtual_gui.py || { echo "❌ patches/patch_virtual_gui.py missing"; exit 1; }
        test -f patches/patch_virtual_gui_yflip.py || { echo "❌ patches/patch_virtual_gui_yflip.py missing"; exit 1; }
        
        # Documentation
        test -f docs/DEPLOYMENT_GUIDE.md || { echo "❌ docs/DEPLOYMENT_GUIDE.md missing"; exit 1; }
        test -f docs/ARCHITECTURE.md || { echo "❌ docs/ARCHITECTURE.md missing"; exit 1; }
        test -f docs/TROUBLESHOOTING.md || { echo "❌ docs/TROUBLESHOOTING.md missing"; exit 1; }
        
        echo "✅ All required files present"
    
    - name: Check for forbidden files
      run: |
        echo "Checking for old/duplicate files..."
        
        # Should not exist (cleaned up)
        ! test -f sap_led_demo_enhanced.py || { echo "❌ Old file found: sap_led_demo_enhanced.py"; exit 1; }
        ! test -f sap_led_demo_fixed.py || { echo "❌ Old file found: sap_led_demo_fixed.py"; exit 1; }
        ! test -f sap_led_demo_final.py || { echo "❌ Old file found: sap_led_demo_final.py"; exit 1; }
        ! test -f run_led_sap_demo_fixed.sh || { echo "❌ Old file found: run_led_sap_demo_fixed.sh"; exit 1; }
        
        echo "✅ No old/duplicate files found"

  validate-python:
    runs-on: ubuntu-latest
    name: Validate Python Code
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check Python syntax
      run: |
        echo "Checking Python syntax..."
        python -m py_compile src/sap_led_demo.py
        python -m py_compile src/sap_quantum_led_demo.py
        python -m py_compile src/neopixel_spi_SAPtestFunc.py
        python -m py_compile patches/patch_virtual_gui.py
        python -m py_compile patches/patch_virtual_gui_yflip.py
        echo "✅ All Python files have valid syntax"
    
    - name: Check for common issues
      run: |
        echo "Checking for common code issues..."
        
        # Check for hardcoded IPs (should use YOUR_IP placeholder)
        if grep -r "100\.67\.33\." src/ scripts/ patches/ 2>/dev/null; then
          echo "❌ Hardcoded IP address found"
          exit 1
        fi
        
        # Check for absolute paths (should be relative)
        if grep -r "/home/rasqberry" src/*.py 2>/dev/null | grep -v "# " | grep -v "\"\"\""; then
          echo "⚠️ Warning: Absolute paths found in source code"
        fi
        
        echo "✅ No critical issues found"

  validate-scripts:
    runs-on: ubuntu-latest
    name: Validate Shell Scripts
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check shell script syntax
      run: |
        echo "Checking shell script syntax..."
        bash -n scripts/rq_led_sap_demo.sh
        echo "✅ Shell scripts have valid syntax"
    
    - name: Check script permissions
      run: |
        echo "Checking script permissions..."
        test -x scripts/rq_led_sap_demo.sh || { echo "❌ Script not executable"; exit 1; }
        echo "✅ Scripts have correct permissions"

  validate-docs:
    runs-on: ubuntu-latest
    name: Validate Documentation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check markdown links
      run: |
        echo "Checking documentation links..."
        
        # Check if referenced files exist
        grep -o '\[.*\](docs/.*\.md)' README.md | sed 's/.*(\(.*\))/\1/' | while read file; do
          test -f "$file" || { echo "❌ Broken link: $file"; exit 1; }
        done
        
        echo "✅ All documentation links valid"
    
    - name: Check documentation completeness
      run: |
        echo "Checking documentation completeness..."
        
        # README should mention deployment guide
        grep -q "DEPLOYMENT_GUIDE" README.md || { echo "❌ README missing deployment guide reference"; exit 1; }
        
        # Deployment guide should have safety section
        grep -q "Safety Guarantees" docs/DEPLOYMENT_GUIDE.md || { echo "❌ Deployment guide missing safety section"; exit 1; }
        
        echo "✅ Documentation is complete"

  validate-safety:
    runs-on: ubuntu-latest
    name: Validate Safety Measures
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Check deployment safety
      run: |
        echo "Checking deployment safety measures..."
        
        # Deployment guide should mention backups
        grep -q "backup" docs/DEPLOYMENT_GUIDE.md || { echo "❌ No backup instructions"; exit 1; }
        
        # Deployment guide should mention rollback
        grep -q "rollback\|Rollback" docs/DEPLOYMENT_GUIDE.md || { echo "❌ No rollback instructions"; exit 1; }
        
        # Should not modify core RasQberry files
        ! grep -q "/usr/config/rasqberry_environment.env" src/*.py || { echo "❌ Source code modifies config"; exit 1; }
        
        echo "✅ Safety measures in place"
    
    - name: Check isolation
      run: |
        echo "Checking demo isolation..."
        
        # Main demo should be in user home directory
        grep -q "/home/rasqberry/led_sap_demo.py" docs/DEPLOYMENT_GUIDE.md || { echo "❌ Demo not in user directory"; exit 1; }
        
        # Should not affect other demos
        grep -q "Other demos.*Not affected" docs/DEPLOYMENT_GUIDE.md || { echo "❌ No isolation guarantee"; exit 1; }
        
        echo "✅ Demo is properly isolated"

  summary:
    runs-on: ubuntu-latest
    name: Validation Summary
    needs: [validate-structure, validate-python, validate-scripts, validate-docs, validate-safety]
    
    steps:
    - name: Summary
      run: |
        echo "================================"
        echo "✅ All validation checks passed!"
        echo "================================"
        echo ""
        echo "Repository is ready for deployment:"
        echo "  ✅ Structure validated"
        echo "  ✅ Python code validated"
        echo "  ✅ Shell scripts validated"
        echo "  ✅ Documentation validated"
        echo "  ✅ Safety measures validated"
        echo ""
        echo "Safe to deploy to RasQberry! 🚀"